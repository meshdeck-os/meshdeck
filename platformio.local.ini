; MeshDeck OS - custom standalone MeshCore firmware for LilyGo T-Deck
; This file is copied into the MeshCore checkout as platformio.local.ini
; (it is picked up automatically via extra_configs)

[env:MeshDeck_TDeck_868]
extends = LilyGo_TDeck
build_flags =
  ${LilyGo_TDeck.build_flags}
  -UDISPLAY_CLASS
  -I examples/meshdeck
  -I examples/meshdeck/ui
  -D MESHDECK=1
  -D MESHDECK_VERSION='"1.0.0"'
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=32
  -D BLE_PIN_CODE=123456
  ; GPS support (external module on the T-Deck Grove/UART header). Compiled in
  ; but only polled when enabled in Settings -> GPS (default off, no module = no-op).
  -D ENV_INCLUDE_GPS=1
  ; Default: EU/UK (Narrow) community preset - 869.618 MHz, BW 62.5, SF8, CR8.
  ; This only applies on a fresh flash; the first-boot onboarding lets the user
  ; pick any regional preset (and it can be re-run from Settings).
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D LORA_CR=8
build_src_filter = ${LilyGo_TDeck.build_src_filter}
  -<helpers/ui/ST7789LCDDisplay.cpp>
  +<helpers/esp32/*.cpp>
  +<../examples/meshdeck/*.cpp>
  +<../examples/meshdeck/ui/*.cpp>
  +<../examples/meshdeck/ui/*.c>
lib_deps =
  ${LilyGo_TDeck.lib_deps}
  densaugeo/base64 @ ~1.4.0

; ---------------------------------------------------------------------------
; Beta channel: identical to stable but with -D MESHDECK_BETA=1, which enables
; experimental features (e.g. the audio / voice proof-of-concept) gated behind
; #ifdef MESHDECK_BETA. Built and published alongside stable so testers can try
; risky features without touching the stable flasher.
[env:MeshDeck_TDeck_868_beta]
extends = env:MeshDeck_TDeck_868
build_flags =
  ${env:MeshDeck_TDeck_868.build_flags}
  -D MESHDECK_BETA=1
